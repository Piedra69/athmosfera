<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Athmosfera</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            background: linear-gradient(135deg, #061527, #10182f, #22143e);
            text-align: center;
            padding: 24px;
        }
        .card {
            max-width: 760px;
            padding: 34px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,.18);
            background: rgba(255,255,255,.12);
        }
        h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            margin: 0 0 16px;
            letter-spacing: -.08em;
        }
        p {
            line-height: 1.7;
            color: rgba(255,255,255,.82);
        }
        strong { color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Athmosfera</h1>
        <p>
            Esta es una página estática para GitHub Pages.
            La versión real con cámara, Flask y TensorFlow necesita un servidor Python.
        </p>
        <p><strong>Para predicción real usa Render, Railway, PythonAnywhere o Replit.</strong></p>
    </div>
</body>
</html>
